{% extends 'store/base.html' %}

{% block content %}

<h2 class="mb-4">My Orders</h2>

<table class="table table-bordered">

<tr>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
<th>Date</th>
</tr>

{% for order in orders %}

<tr>
<td>{{ order.product.name }}</td>
<td>{{ order.quantity }}</td>
<td>₹ {{ order.price }}</td>
<td>{{ order.created_at }}</td>
</tr>

{% empty %}

<tr>
<td colspan="4" class="text-center">
No Orders Yet
</td>
</tr>

{% endfor %}

</table>

{% endblock %}
