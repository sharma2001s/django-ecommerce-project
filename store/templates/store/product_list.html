{% extends 'store/base.html' %}

{% block content %}

<h2 class="mb-4">Our Products</h2>

<div class="row">

{% for product in products %}

<div class="col-md-4 mb-4">

<div class="card shadow h-100">

<a href="{% url 'product_detail' product.id %}">
<img src="{{ product.image.url }}" class="card-img-top" style="height:250px; object-fit:cover;">
</a>

<div class="card-body d-flex flex-column">

<h5>
<a href="{% url 'product_detail' product.id %}" style="text-decoration:none; color:black;">
{{ product.name }}
</a>
</h5>

<p class="text-success fw-bold">₹ {{ product.price }}</p>

<a href="{% url 'add_to_cart' product.id %}" class="btn btn-primary mt-auto">
Add to Cart
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
